<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Invoice Sehangat Rumah</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:20px auto;
    padding:15px;
}
h2{margin-bottom:20px;}
.form-group{margin-bottom:15px;}
input[type="text"],input[type="number"]{
    width:100%;
    max-width:400px;
    padding:10px;
    box-sizing:border-box;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    margin-bottom:20px;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}
th{background:#f5f5f5;}
.qty-input{
    width:70px;
}
button{
    padding:10px 14px;
    margin:4px;
    cursor:pointer;
}
textarea{
    width:100%;
    height:350px;
    padding:10px;
    box-sizing:border-box;
}
@media(max-width:600px){
    body{padding:10px;}
    th,td{padding:8px;font-size:14px;}
}
</style>
</head>
<body>

<h2>🧾 Generator Invoice Sehangat Rumah</h2>

<div class="form-group">
<label>Nama Customer</label><br>
<input type="text" id="customerName" placeholder="Contoh: Vina">
</div>

<div class="form-group">
<label>Nomor WhatsApp</label><br>
<input type="text" id="whatsappNumber" placeholder="6281234567890">
</div>

<div class="form-group">
<label>Ongkir</label><br>
<input type="number" id="shippingCost" value="0" min="0">
</div>

<table>
<thead>
<tr>
<th>Produk</th>
<th>Harga</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="productTable"></tbody>
</table>

<div>
<button onclick="generateInvoice()">🧾 Generate Invoice</button>
<button id="copyBtn" onclick="copyInvoice()">📋 Copy Invoice</button>
<button onclick="sendWhatsApp()">📱 WhatsApp</button>
<button onclick="resetForm()">🔄 Reset</button>
</div>

<textarea id="result" placeholder="Invoice akan muncul di sini..."></textarea>

<script>
var products = [
{name:"Banana Cheese Bread Slice",price:26000},
{name:"Iceberg Cheese Cake Slice",price:38000},
{name:"Kopi PopCorn 250 Ml",price:27000},
{name:"Kopi Pandan 250 Ml",price:22000},
{name:"Kopi Kopiko 250 Ml",price:22000},
{name:"Banana Cheese Bread Loyang",price:148000},
{name:"Iceberg Cheese Cake Loyang",price:260000},
{name:"Kopi PopCorn 1 L",price:99000},
{name:"Kopi Pandan 1 L",price:80000},
{name:"Kopi Kopiko 1 L",price:80000},
{name:"Iceberg Cheese Cake D10",price:55000},
{name:"Banoffee 250 ML",price:25000}
];

function formatRupiah(value){
    return "Rp " + Number(value).toLocaleString("id-ID");
}

var productTable = document.getElementById("productTable");

for(var i=0;i<products.length;i++){
    productTable.innerHTML +=
    "<tr>" +
    "<td>"+products[i].name+"</td>" +
    "<td>"+formatRupiah(products[i].price)+"</td>" +
    "<td><input type='number' min='0' value='0' class='qty-input' id='qty-"+i+"'></td>" +
    "</tr>";
}

function generateInvoice(){

    var customerName = document.getElementById("customerName").value.trim() || "Customer";
    var shippingCost = parseInt(document.getElementById("shippingCost").value) || 0;

    var itemsText = "";
    var subtotal = 0;

    for(var i=0;i<products.length;i++){

        var qty = parseInt(document.getElementById("qty-"+i).value) || 0;

        if(qty > 0){

            var lineTotal = qty * products[i].price;

            subtotal += lineTotal;

            itemsText += "• " + products[i].name + " x" + qty + " - " + formatRupiah(lineTotal) + "\n";
        }
    }

    if(subtotal === 0){
        alert("Pilih minimal 1 produk.");
        return;
    }

    var grandTotal = subtotal + shippingCost;
    var today = new Date().toLocaleDateString("id-ID");
    var invoiceNo = "INV-" + Date.now().toString().slice(-6);

    var invoice =
"Nomor Invoice: " + invoiceNo + "\n" +
"Tanggal: " + today + "\n\n" +
"Halo Kak " + customerName + " 👋\n\n" +
"Pesanan Kakak sudah kami siapkan 💛\n\n" +
itemsText + "\n" +
"Subtotal:\n" + formatRupiah(subtotal) + "\n\n" +
"Ongkir:\n" + formatRupiah(shippingCost) + "\n\n" +
"Total pembayaran:\n" + formatRupiah(grandTotal) + "\n\n" +
"Pembayaran bisa ke:\n\n" +
"Bank JAGO\n" +
"a/n ALAIDA NAJIEB\n" +
"105142734320\n\n" +
"Terima kasih telah memesan di Sehangat Rumah ☕✨\n\n" +
"Instagram:\n@SehangatRumah";

    document.getElementById("result").value = invoice;
}

function copyInvoice(){
    var text = document.getElementById("result").value;

    if(!text){
        alert("Generate invoice terlebih dahulu.");
        return;
    }

    navigator.clipboard.writeText(text).then(function(){
        document.getElementById("copyBtn").innerHTML = "✅ Tersalin!";
        setTimeout(function(){
            document.getElementById("copyBtn").innerHTML = "📋 Copy Invoice";
        },2000);
    });
}

function sendWhatsApp(){

    var number = document.getElementById("whatsappNumber").value.trim();
    var invoice = document.getElementById("result").value;

    if(!invoice){
        alert("Generate invoice terlebih dahulu.");
        return;
    }

    if(!number){
        alert("Isi nomor WhatsApp terlebih dahulu.");
        return;
    }

    window.open("https://wa.me/" + number + "?text=" + encodeURIComponent(invoice), "_blank");
}

function resetForm(){
    document.getElementById("customerName").value = "";
    document.getElementById("whatsappNumber").value = "";
    document.getElementById("shippingCost").value = "0";
    document.getElementById("result").value = "";

    for(var i=0;i<products.length;i++){
        document.getElementById("qty-"+i).value = "0";
    }

    document.getElementById("copyBtn").innerHTML = "📋 Copy Invoice";
}
</script>

</body>
</html>
